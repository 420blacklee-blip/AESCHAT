# === E2EE Chatroom 服务器配置文件 (V5.6.5 Strict & Proxy 版) ===
# 注意：此版本已取消所有代码内的默认值兜底，请确保以下参数均已正确填写。

# ==========================================
# [1. 核心网络配置]
# ==========================================
# 监听 IP 地址
# - 本地 CF Tunnel 模式: 填 127.0.0.1 (最安全，仅允许本地进程或隧道转发)
# - VPS 局域网/公网直连: 填 0.0.0.0 (允许全网/局域网直接访问)
BIND_IP=0.0.0.0

# 监听端口
PORT=888

# 反向代理模式开关 (true / false)
# - 填 true: 当服务运行在 Nginx、Cloudflare Tunnel 或 HuggingFace 后方时开启。
#            开启后，程序将智能提取用户的真实外网 IP，而非代理服务器的内网 IP。
# - 填 false: 裸连暴露公网时使用。关闭头部信任，彻底杜绝 HTTP 头部 IP 伪造漏洞。
REVERSE_PROXY=true

# ==========================================
# [2. 系统容量与生命周期限制]
# ==========================================
# 文本历史记录最大保留条数 (每个房间独立计算)
HISTORY_MAX=25

# 图片历史记录最大保留条数 (每个房间独立计算)
IMAGE_MAX=25

# 服务器最大并发连接人数 (超过此人数的新连接将被安全拒绝)
MAX_CLIENTS=500

# 控制台 Session 登录有效时长 (单位: 秒，7200秒 = 2小时)
SESSION_TIMEOUT=7200

# ==========================================
# [3. SSL/HTTPS 原生加密配置]
# ==========================================
# 如果你想让 Python 直接处理加密 (例如裸连模式)，请填入证书的绝对路径。
# 注意：如果你使用 Cloudflare Tunnel 或 Nginx 反代，请务必留空！由代理处理 SSL 即可。
# 示例: SSL_CERT=/etc/letsencrypt/live/domain.com/fullchain.pem
SSL_CERT=
SSL_KEY=

# ==========================================
# [4. 核心安全配置]
# ==========================================
# 监控面板登录密钥 (由 gen_pass.py 生成的双重加盐哈希值)
# 如果留空，将自动禁用 /monitor 监控面板以及所有高权限 API (物理关机、封禁等)。
admin_key=b4ac5cc43a5d668b$fb35d42fae03bac616593b9461b187c07a7550fd353bd981ce7c9de99f40de5c

# ==========================================
# [5. 封禁名单 (由系统自动维护)]
# ==========================================
# 被封禁的用户 UID 列表 (使用 | 分隔)
banned=

# 被封禁的恶意物理 IP 列表 (使用 | 分隔)
banned_ips=