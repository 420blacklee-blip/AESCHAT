# === E2EE Chatroom 服务器配置文件 (V5.7.0 Stealth Defense 版) ===
# [隐蔽防御机制]: 触发熔断后，新访客将被浏览器静默重定向渲染指定的 iframe 页面。
# 注意：所有 KEY 项建议通过 gen_pass.py 生成 salt$hash 格式，严禁填写明文。


# ==========================================
# [1. 核心网络配置]
# ==========================================
# 监听 IP 地址
BIND_IP=0.0.0.0

# 监听端口
PORT=888

# 反向代理模式开关 (true / false)
REVERSE_PROXY=true

# ==========================================
# [2. 系统容量与生命周期限制]
# ==========================================
# 文本历史记录最大保留条数 (每个房间独立计算)
HISTORY_MAX=25

# 图片历史记录最大保留条数 (每个房间独立计算)
IMAGE_MAX=25

# 服务器最大并发连接人数
MAX_CLIENTS=500

# 控制台 Session 登录有效时长 (单位: 秒)
SESSION_TIMEOUT=7200

# ==========================================
# [3. SSL/HTTPS 配置]
# ==========================================
# 如果不需要 SSL，请保持路径为空
SSL_CERT_PATH=
SSL_KEY_PATH=

# ==========================================
# [4. 权限与紧急安全控制]
# ==========================================
# 运维面板登录 Key
admin_key=b4ac5cc43a5d668b$fb35d42fae03bac616593b9461b187c07a7550fd353bd981ce7c9de99f40de5c

# 聊天室熔断开关 Key (关门打狗 / 隐蔽防御)
switch_key=7776ee3bc77f1b57$9452c9b69b35f2781b84990d91a8545599e69d87e55be98ddf70cca787ab9290

# 空间跳跃迁移 Key (全员强制转移至随机新房间)
room_change_key=dcbec3d0bce10e54$f537077c56270c516400e0cc2528892a710063058156df88f6c2f412b5dab9ab

# ==========================================
# [5. 态势感知与隐蔽防线]
# ==========================================
# 【新增】伪装站点 URL
# 功能：当 switch_key 触发熔断后，非白名单内的访客访问网页时，
# 整个页面将被此 iframe 覆盖，实现隐蔽伪装，防止审查探针嗅探。
iframe=https://www.baidu.com

# 被封禁的用户 UID 列表 (使用 | 分隔，系统自动维护)
banned=

# 被封禁的恶意物理 IP 列表 (使用 | 分隔，系统自动维护)
banned_ips=

# ==========================================
# [6. 环境变量与调试]
# ==========================================
# 调试模式 (true / false)，生产环境建议关闭
DEBUG_MODE=false
